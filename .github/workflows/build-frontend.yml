name: Build Frontend

on:
  pull_request:

jobs:
  build-frontend:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ./src/SchulBusserl.ClientApp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

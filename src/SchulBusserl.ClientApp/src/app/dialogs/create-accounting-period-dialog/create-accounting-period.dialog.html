<h2 mat-dialog-title>Zeitraum hinzufügen</h2>
<mat-dialog-content>
  <mat-form-field class="w-100">
    <mat-label>Name {{ context().text }}</mat-label>
    <input matInput [formControl]="form.controls.name">
  </mat-form-field>
</mat-dialog-content>
<app-save-dialog-actions (cancelClicked)="onCloseClicked()" />

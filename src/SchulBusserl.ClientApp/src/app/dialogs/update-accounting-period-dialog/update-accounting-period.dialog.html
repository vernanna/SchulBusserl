<h2 mat-dialog-title>Zeitraum ändern</h2>
<mat-dialog-content>
  <mat-form-field class="w-100">
    <mat-label>Name</mat-label>
    <input matInput [formControl]="form.controls.name">
  </mat-form-field>
</mat-dialog-content>
<app-save-dialog-actions [canSave]="canSubmit()" [error]="submissionError()" (saveClicked)="onSubmitRequested()" (cancelClicked)="oncloseRequested()" />
